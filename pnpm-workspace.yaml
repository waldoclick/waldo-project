packages:
  - 'apps/strapi'
  - 'apps/website'
  - 'apps/design'
# pnpm 10+ syntax
allowBuilds:
  '@parcel/watcher': true
  '@sentry-internal/node-cpu-profiler': true
  '@sentry/cli': true
  '@swc/core': true
  better-sqlite3: true
  core-js: true
  core-js-pure: true
  cypress: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  vue-demi: true
# pnpm 9 syntax (fallback for Vercel's default pnpm)
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@sentry-internal/node-cpu-profiler'
  - '@sentry/cli'
  - '@swc/core'
  - better-sqlite3
  - core-js
  - core-js-pure
  - cypress
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
  - vue-demi

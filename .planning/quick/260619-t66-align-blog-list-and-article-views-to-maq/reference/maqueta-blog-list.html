  <!-- ===================== BLOG: LISTADO ===================== -->
  <sc-if value="{{ isBlog }}" hint-placeholder-val="{{ false }}">
  <div data-screen-label="Blog">
    <section style="background:var(--cream);border-bottom:1px solid var(--line);position:relative;overflow:hidden">
      <div style="position:absolute;top:-130px;right:-90px;width:460px;height:460px;border-radius:50%;background:radial-gradient(circle,rgba(247,201,126,.16),transparent 65%);pointer-events:none"></div>
      <div class="hpad" style="max-width:1200px;margin:0 auto;padding:108px 32px 44px;position:relative">
        <nav style="display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted);margin-bottom:14px">
          <a onClick="{{ goHome }}" style="color:var(--muted);text-decoration:none;cursor:pointer" style-hover="color:var(--ink)">Waldo</a>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B6B2BB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          <span style="color:var(--ink);font-weight:600">Blog</span>
        </nav>
        <span style="display:inline-flex;align-items:center;gap:8px;background:rgba(247,201,126,.28);color:var(--tag);font-weight:600;font-size:13px;padding:7px 14px;border-radius:4px;letter-spacing:.2px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#A9772E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Blog Waldo</span>
        <h1 style="font-family:'Poppins',sans-serif;font-weight:800;color:var(--ink);font-size:clamp(32px,3.6vw,46px);letter-spacing:-.7px;margin:12px 0 0;line-height:1.08">Activos industriales, explicados</h1>
        <p style="font-size:17px;line-height:1.55;color:var(--ink2);margin:14px 0 0;max-width:680px;text-wrap:pretty">Guías de compra y venta, lectura de mercado, mantención y logística. Todo lo que necesitas saber para mover maquinaria con confianza.</p>
      </div>
    </section>
    <section class="blog-body" style="max-width:1200px;margin:0 auto;padding:40px 32px 88px">
      <!-- toolbar: dropdown categorías | buscador | limpiar filtros -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:30px">
        <div data-blogdrop style="position:relative;flex:none">
          <button onClick="{{ blogDropToggle }}" style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:4px;padding:12px 14px;font-family:inherit;font-weight:600;font-size:14px;color:var(--ink);cursor:pointer;white-space:nowrap" style-hover="border-color:#26252B">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
            {{ blogDropLabel }}
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <sc-if value="{{ blogDropOpen }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px;min-width:210px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.10)">
              <sc-for list="{{ blogDropItems }}" as="di" hint-placeholder-count="6">
                <label onClick="{{ di.onClick }}" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:4px;cursor:pointer;font-size:14px;color:var(--ink);font-weight:500" style-hover="background:var(--cream)">
                  <span style="{{ di.boxStyle }}">{{ di.tick }}</span>
                  {{ di.label }}
                </label>
              </sc-for>
            </div>
          </sc-if>
        </div>
        <label style="flex:0 1 380px;max-width:380px;display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:4px;padding:12px 15px" style-focus-within="border-color:var(--amber)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#8A8794" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input value="{{ blogQuery }}" onInput="{{ onBlogQuery }}" placeholder="Buscar artículos…" style="border:none;outline:none;background:transparent;font-family:inherit;font-size:15px;color:var(--ink);width:100%"/>
        </label>
        <sc-if value="{{ blogHasFilters }}" hint-placeholder-val="{{ false }}">
          <button onClick="{{ blogClearFilters }}" style="flex:none;border:none;background:transparent;cursor:pointer;font-family:inherit;font-weight:500;font-size:13.5px;color:var(--muted);padding:0;text-decoration:underline;text-underline-offset:3px;white-space:nowrap" style-hover="color:var(--ink)">Limpiar filtros</button>
        </sc-if>
      </div>

      <sc-if value="{{ blogNoResults }}" hint-placeholder-val="{{ false }}">
        <div style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:64px 24px;text-align:center;color:var(--muted)">
          <span style="display:grid;place-items:center;width:48px;height:48px;border-radius:50%;background:var(--cream);margin:0 auto 16px"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#8A8794" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
          <span style="display:block;font-weight:700;color:var(--ink);font-size:17px;font-family:'Poppins',sans-serif">Sin resultados</span>
          <p style="margin:8px 0 18px;font-size:14.5px">No encontramos artículos que coincidan con tu búsqueda.</p>
          <button onClick="{{ blogClearFilters }}" style="border:1px solid var(--line);background:#fff;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;color:var(--ink);padding:11px 22px;border-radius:4px" style-hover="border-color:#26252B">Limpiar filtros</button>
        </div>
      </sc-if>

      <sc-if value="{{ blogHasResults }}" hint-placeholder-val="{{ true }}">
        <div class="g3" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px">
          <sc-for list="{{ blogPaged }}" as="b" hint-placeholder-count="6">
            <dc-import name="BlogCard" article="{{ b.article }}" on-open="{{ b.onOpen }}" hint-size="100%,320px" style="display:block"></dc-import>
          </sc-for>
        </div>
      </sc-if>

      <sc-if value="{{ blogHasResults }}" hint-placeholder-val="{{ true }}">
        <div style="margin-top:36px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
          <sc-if value="{{ blogShowRange }}" hint-placeholder-val="{{ true }}"><span style="font-size:13.5px;color:var(--muted)">{{ blogRange }}</span></sc-if>
          <sc-if value="{{ blogHasPager }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
              <sc-for list="{{ blogPager }}" as="pg" hint-placeholder-count="2">
                <button onClick="{{ pg.onClick }}" style="{{ pg.style }}">{{ pg.n }}</button>
              </sc-for>
            </div>
          </sc-if>
        </div>
      </sc-if>
    </section>
  </div>
  </sc-if>

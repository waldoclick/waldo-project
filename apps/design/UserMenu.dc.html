<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</helmet>
<div data-usermenu="1" style="--ink:#26252B;--ink2:#56535F;--muted:#8A8794;--amber:#F7C97E;--amberH:#EFB85C;--cream:#F6F4F1;--line:#ECE9E4;position:relative;font-family:'Poppins',system-ui,sans-serif">
  <button onClick="{{ toggle }}" style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:4px;padding:5px 12px 5px 5px;cursor:pointer;font-family:inherit" style-hover="background:var(--cream)">
    <span style="flex:none;width:34px;height:34px;border-radius:50%;overflow:hidden;background:var(--amber);color:#26252B;display:grid;place-items:center;font-weight:700;font-size:13px;letter-spacing:.02em">{{ avatarEl }}</span>
    <span style="display:flex;flex-direction:column;align-items:flex-start;line-height:1.1">
      <span style="font-size:11px;color:var(--muted);font-weight:500">Hola</span>
      <span style="font-size:14px;font-weight:600;color:var(--ink)">{{ userName }}</span>
    </span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8A8794" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;transition:transform .25s ease;transform:rotate({{ chevron }})"><path d="m6 9 6 6 6-6"/></svg>
  </button>
  <sc-if value="{{ open }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:calc(100% + 12px);right:0;width:256px;background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;z-index:60;box-shadow:0 18px 38px -16px rgba(20,18,30,.22)">
      <sc-for list="{{ groups }}" as="g" hint-placeholder-count="2">
        <div style="{{ g.wrapStyle }}">
          <sc-for list="{{ g.items }}" as="m" hint-placeholder-count="4">
            <a onClick="{{ m.onClick }}" style="display:block;padding:9px 12px;border-radius:4px;text-decoration:none;font-size:14.5px;font-weight:500;color:var(--ink2);cursor:pointer" style-hover="background:var(--cream);color:var(--ink)">{{ m.label }}</a>
          </sc-for>
        </div>
      </sc-for>
      <div style="height:1px;background:var(--line);margin:0 12px"></div>
      <div style="padding:6px">
        <a onClick="{{ logout }}" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:4px;text-decoration:none;font-size:14.5px;font-weight:600;color:var(--ink);cursor:pointer" style-hover="background:var(--cream)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#26252B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>Cerrar sesión</a>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:260,&quot;height&quot;:70},&quot;initials&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;GB&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Gabriel&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;groups&quot;:{&quot;editor&quot;:null,&quot;default&quot;:[],&quot;tsType&quot;:&quot;{items:{label:string,onClick:Function}[]}[]&quot;},&quot;onLogout&quot;:{&quot;editor&quot;:null,&quot;default&quot;:null,&quot;tsType&quot;:&quot;Function&quot;}}">
class Component extends DCLogic {
  state = { open:false };
  componentDidMount(){
    this._onDoc = (e)=>{ if(!this.state.open) return; if(e.target&&e.target.closest&&e.target.closest('[data-usermenu]')) return; this.setState({open:false}); };
    document.addEventListener('click', this._onDoc, true);
  }
  componentWillUnmount(){ document.removeEventListener('click', this._onDoc, true); }
  renderVals(){
    const open = this.state.open;
    const raw = this.props.groups || [];
    const groups = raw.map((g,i)=>({
      wrapStyle: "padding:6px;" + (i>0 ? "border-top:1px solid var(--line);" : ""),
      items: (g.items || []).map(it=>({
        label: it.label,
        onClick: (e)=>{ if(e&&e.preventDefault) e.preventDefault(); this.setState({open:false}); if(it.onClick) it.onClick(e); },
      })),
    }));
    const av = this.props.avatar || '';
    return {
      initials: this.props.initials ?? 'GB',
      userName: this.props.userName ?? 'Gabriel',
      avatarEl: av ? React.createElement('img',{src:av,alt:'',style:{width:'100%',height:'100%',objectFit:'cover'}}) : (this.props.initials ?? 'GB'),
      open,
      chevron: open ? '180deg' : '0deg',
      groups,
      toggle: (e)=>{ if(e&&e.preventDefault) e.preventDefault(); this.setState(s=>({open:!s.open})); },
      close: (e)=>{ if(e&&e.preventDefault) e.preventDefault(); this.setState({open:false}); },
      logout: (e)=>{ if(e&&e.preventDefault) e.preventDefault(); this.setState({open:false}); const f=this.props.onLogout; if(f) f(e); },
    };
  }
}
</script>
</body>
</html>
